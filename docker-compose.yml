services:
  # Neo4j — 图数据库，内置 APOC 插件
  neo4j:
    image: neo4j:5.26-community
    container_name: lightrag-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt 协议连接
    environment:
      - NEO4J_AUTH=neo4j/LightRAG2026!
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_trigger_enabled=true
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - lightrag-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "LightRAG2026!", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # Qdrant — 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: lightrag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    environment:
      - QDRANT__SERVICE__API_KEY=LightRAG2026Qdrant!
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - lightrag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  qdrant_data:
    driver: local

networks:
  lightrag-net:
    driver: bridge
