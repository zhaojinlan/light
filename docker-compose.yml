services:
  # Neo4j — 图数据库，内置 APOC 插件
  neo4j:
    image: neo4j:5.26-community
    container_name: reco-lightrag-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt 协议连接
    environment:
      - NEO4J_AUTH=neo4j/LightRAG2026!
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_trigger_enabled=true
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - lightrag-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "LightRAG2026!", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # Qdrant — 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: reco-lightrag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    environment:
      - QDRANT__SERVICE__API_KEY=LightRAG2026Qdrant!
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - lightrag-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MongoDB — 文档 KV 存储
  mongo:
    image: mongo:7
    container_name: reco-lightrag-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongouser
      - MONGO_INITDB_ROOT_PASSWORD=LightRAG2026Mongo!
    volumes:
      - mongo_data:/data/db
    networks:
      - lightrag-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # LightRAG HTTP 服务
  lightserver:
    build: .
    container_name: reco-lightserver
    ports:
      - "8001:8001"
    env_file:
      - docker.env
    environment:
      # 覆盖 docker.env 中的 localhost 为容器网络名
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
      - MONGO_URI=mongodb://mongouser:LightRAG2026Mongo!@mongo:27017/
    volumes:
      - ./rag_storage:/app/rag_storage
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - lightrag-net

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  qdrant_data:
    driver: local
  mongo_data:
    driver: local

networks:
  lightrag-net:
    driver: bridge
